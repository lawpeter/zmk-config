# Shield-level Kconfig defaults for the Custom 65% keyboard.
# Options are added incrementally as features land (see ZMK_Firmware_PRD.md §11).

# The key matrix columns live on an MCP23017 over I2C. GPIO ops on an I2C
# expander can sleep, which is unsafe in the interrupt-driven scan path, so scan
# the matrix by polling from a thread instead (same approach as the in-tree
# Ferris rev02, which also scans an MCP23017). Deep-sleep wake is unaffected: it
# uses the nRF row inputs' GPIO sense interrupt, not the active-scan path.
CONFIG_ZMK_KSCAN_MATRIX_POLLING=y

# I2C subsystem must be opted-in explicitly; setting status="okay" on the
# &i2c0 DT node alone does NOT auto-enable CONFIG_I2C in Zephyr 3.5. Once
# I2C=y the nRF TWIM driver auto-selects from DT, and the MCP230XX GPIO
# driver dependency (depends on I2C) is satisfied.
CONFIG_I2C=y

# The MCP23017 GPIO expander driver depends on I2C (above) and is not
# auto-enabled from the DT node alone on this nRF52840 build; keep it
# explicit to avoid __device_dts_ord_N linker errors.
CONFIG_GPIO_MCP230XX=y

# EC11 encoder trigger mode — use the global thread so the sensor fires
# from interrupt context without blocking the main thread.
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Enable pointing (mouse scroll + buttons) for the FN2 encoder layer
# (SCRL_UP/SCRL_DOWN on rotation, MCLK on push).
CONFIG_ZMK_POINTING=y
